version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: isp_erp
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=isp_erp
      - DB_USER=isp_user
      - DB_PASSWORD=isp_pass
      - DB_HOST=db
      - DB_PORT=5432

  celery_worker:
    build: .
    command: celery -A isp_erp_backend worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=isp_erp
      - DB_USER=isp_user
      - DB_PASSWORD=isp_pass
      - DB_HOST=db
      - DB_PORT=5432

  celery_beat:
    build: .
    command: celery -A isp_erp_backend beat -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=isp_erp
      - DB_USER=isp_user
      - DB_PASSWORD=isp_pass
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data: